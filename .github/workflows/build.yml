name: Build

# Build the Windows EXE on every push / PR as a sanity check. This does NOT
# publish anything - it just proves the app still packages and that the exe
# ships with its bundled tools, fonts, icon and INI templates.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Run the v4 JS actions on Node 24 (they ship for Node 20, which GitHub is retiring).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # electron-builder downloads a ~110 MB Electron binary; cache it between runs.
      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (node --check)
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -Filter *.js -Path src | Select-Object -ExpandProperty FullName
          $fail = $false
          foreach ($f in $files) {
            node --check $f
            if ($LASTEXITCODE -ne 0) { Write-Host "FAIL: $f"; $fail = $true }
          }
          if ($fail) { exit 1 }
          Write-Host "All JS syntax OK ($($files.Count) files)"

      - name: Build EXE (electron-builder --dir)
        run: npm run pack

      - name: Verify packaged layout
        shell: pwsh
        run: |
          $root = "dist/win-unpacked"
          $required = @(
            "M2_SCOUT.exe",
            "TOOLS/rg.exe", "TOOLS/fd.exe", "TOOLS/cscope.exe",
            "FONTS", "LOGO/M2_SCOUT.ico",
            "M2_SCOUT.ini", "M2_SCOUT_EXCLUDE_GROUPS.ini", "M2_SCOUT_HL.ini",
            "context-menu.ps1",
            "resources/app.asar"
          )
          $fail = $false
          foreach ($r in $required) {
            if (-not (Test-Path (Join-Path $root $r))) { Write-Host "MISSING: $r"; $fail = $true }
          }
          if (Test-Path (Join-Path $root "TOOLS/ZIP")) {
            Write-Host "UNEXPECTED: TOOLS/ZIP was bundled (it should be excluded)"; $fail = $true
          }
          if ($fail) { exit 1 }
          Write-Host "Layout OK: M2_SCOUT.exe + TOOLS + FONTS + LOGO + INI templates present"

      - name: Upload unpacked build
        uses: actions/upload-artifact@v4
        with:
          name: M2_SCOUT-win-unpacked
          path: dist/win-unpacked
          retention-days: 14
