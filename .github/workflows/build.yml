name: Build

# Build the Windows EXE on every push / PR as a sanity check. This does NOT
# publish anything - it just proves the app still packages and that the exe
# ships with its bundled tools, fonts, icon and INI templates.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      # electron-builder downloads a ~110 MB Electron binary; cache it between runs.
      - name: Cache Electron downloads
        uses: actions/cache@v6
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (node --check)
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -Filter *.js -Path src | Select-Object -ExpandProperty FullName
          $fail = $false
          foreach ($f in $files) {
            node --check $f
            if ($LASTEXITCODE -ne 0) { Write-Host "FAIL: $f"; $fail = $true }
          }
          if ($fail) { exit 1 }
          Write-Host "All JS syntax OK ($($files.Count) files)"

      - name: Build EXE (electron-builder --dir, x64 + arm64)
        run: npm run pack

      - name: Verify packaged layout
        shell: pwsh
        run: |
          $targets = @{
            'x64'   = 'dist/win-unpacked'
            'arm64' = 'dist/win-arm64-unpacked'
          }
          $required = @(
            "M2_SCOUT.exe",
            "TOOLS/rg.exe", "TOOLS/fd.exe", "TOOLS/cscope.exe",
            "FONTS", "LOGO/M2_SCOUT.ico",
            "M2_SCOUT.ini", "M2_SCOUT_EXCLUDE_GROUPS.ini", "M2_SCOUT_HL.ini",
            "context-menu.ps1",
            "resources/app.asar"
          )
          $fail = $false
          foreach ($arch in $targets.Keys) {
            $root = $targets[$arch]
            if (-not (Test-Path $root)) { Write-Host "MISSING build dir for ${arch}: $root"; $fail = $true; continue }
            foreach ($r in $required) {
              if (-not (Test-Path (Join-Path $root $r))) { Write-Host "[$arch] MISSING: $r"; $fail = $true }
            }
            if (Test-Path (Join-Path $root "TOOLS/ZIP")) {
              Write-Host "[$arch] UNEXPECTED: TOOLS/ZIP was bundled (it should be excluded)"; $fail = $true
            }
            Write-Host "[$arch] checked $root"
          }
          if ($fail) { exit 1 }
          Write-Host "Layout OK for x64 + arm64: M2_SCOUT.exe + native TOOLS + FONTS + LOGO + INI templates present"

      - name: Upload unpacked builds
        uses: actions/upload-artifact@v7
        with:
          name: M2_SCOUT-win-unpacked
          path: |
            dist/win-unpacked
            dist/win-arm64-unpacked
          retention-days: 14
