name: Sync M2 Common AI

# Sync Copilot config from the central repo into this repo; the sync scope is
# defined by the central repo's .github/sync-manifest.txt.
# Path: .github/workflows/sync-m2-common-ai.yml
#
# -- Required setup: none ---------------------------------------------------
#   The central repo is public, so no token, secret, or variable is needed.
#   The only permission to enable (at org or repo level):
#     Settings -> Actions -> General -> Workflow permissions
#     -> check "Allow GitHub Actions to create and approve pull requests"
#
#   Note: this repo may be private; it is not affected -- reading the
#   "public" central repo requires no authentication.
# ---------------------------------------------------------------------------

on:
  schedule:
    # Check twice daily at 05:00 and 17:00 Taipei time (UTC+8); GitHub cron uses
    # UTC, so: 05:00 UTC+8 = 21:00 UTC (previous day), 17:00 UTC+8 = 09:00 UTC.
    - cron: '0 9,21 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Central repo branch / tag (default main)'
        required: false
        default: 'main'

permissions:
  contents: write
  pull-requests: write
  issues: write             # needed by the "Open issue on failure" step

# Allow only one sync at a time so scheduled and manual runs do not concurrently
# operate on the chore/sync-m2-common-ai branch and conflict.
# cancel-in-progress: false -- let an in-progress sync finish instead of
# cancelling midway and leaving a half-finished state.
concurrency:
  group: sync-m2-common-ai
  cancel-in-progress: false

env:
  # Override via the repo/org variable CENTRAL_AI_REPO; falls back to the default.
  CENTRAL_AI_REPO: ${{ vars.CENTRAL_AI_REPO || 'M2Station/M2_COMMON_AI' }}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10       # safety net: avoid a stuck job burning runner time
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      # Public repo, no token needed
      - name: Checkout central AI config
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CENTRAL_AI_REPO }}
          ref: ${{ inputs.ref || 'main' }}
          path: .central

      - name: Sync files
        id: sync
        env:
          # Pass the user-controllable ref via env var to avoid interpolating
          # ${{ }} directly into the shell (script injection).
          SOURCE_REF: ${{ inputs.ref || 'main' }}
        run: |
          set -euo pipefail

          # The sync scope is defined by the central repo's .github/sync-manifest.txt
          # (single source of truth). To add paths later, edit only the central
          # manifest; this downstream workflow needs no changes.
          MANIFEST='.central/.github/sync-manifest.txt'
          if [[ ! -f "$MANIFEST" ]]; then
            echo "::error::Central manifest not found: .github/sync-manifest.txt (check that the central repo has this file)"
            exit 1
          fi

          # One path per manifest line, relative to .github/:
          #   trailing / -> directory, use rsync --delete (files absent in
          #                 central are deleted downstream)
          #   otherwise  -> single file, overwrite with cp
          #   lines starting with # and blank lines are skipped
          synced=()
          while IFS= read -r line || [[ -n "$line" ]]; do
            path="$(printf '%s' "$line" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
            [[ -z "$path" || "$path" == '#'* ]] && continue

            # Security hardening: only allow clean relative paths under .github/.
            #   - reject absolute paths
            #   - reject . / .. as standalone path segments: they get normalized by
            #     the filesystem/rsync, e.g. ./workflows/ lands in .github/workflows/,
            #     bypassing the workflows/ guard below
            #   - reject workflows/ (GITHUB_TOKEN cannot write .github/workflows/)
            case "$path" in
              /*)
                echo "::error::manifest: absolute paths are not allowed: $path"; exit 1 ;;
              . | .. | ./* | ../* | */./* | */../* | */. | */..)
                echo "::error::manifest: path must not contain . or .. segments: $path"; exit 1 ;;
              workflows | workflows/ | workflows/*)
                echo "::error::manifest: syncing workflows/ is not allowed: $path"; exit 1 ;;
            esac

            src=".central/.github/$path"
            dst=".github/$path"
            if [[ "$path" == */ ]]; then
              [[ -d "$src" ]] || { echo "::error::central is missing directory: .github/$path"; exit 1; }
              mkdir -p "$dst"
              rsync -av --delete "$src" "$dst"
            else
              [[ -f "$src" ]] || { echo "::error::central is missing file: .github/$path"; exit 1; }
              mkdir -p "$(dirname "$dst")"
              cp "$src" "$dst"
            fi
            synced+=(".github/${path%/}")
          done < "$MANIFEST"

          [[ ${#synced[@]} -gt 0 ]] || { echo "::error::manifest has no valid paths"; exit 1; }

          source_sha="$(git -C .central rev-parse HEAD)"
          rm -rf .central

          # Older versions wrote .github/AI_CONFIG_VERSION; after the rename, clean
          # up the leftover file (no-op if it does not exist).
          rm -f .github/AI_CONFIG_VERSION

          # Only write the version file and open a PR when the paths listed in the
          # manifest actually changed. M2_COMMON_AI_VERSION contains a synced_at
          # timestamp; writing it every run would create fake diffs and open an empty
          # PR every time, so compare content first: if unchanged, changed=false and
          # the next step skips opening a PR.
          changes="$(git status --porcelain -- "${synced[@]}")"
          if [[ -n "$changes" ]]; then
            # Record the source version and the files actually changed, for traceability.
            {
              echo "source_repo: ${CENTRAL_AI_REPO}"
              echo "source_ref:  ${SOURCE_REF}"
              echo "source_sha:  ${source_sha}"
              echo "synced_at:   $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "changed_files:"
              echo "$changes" | cut -c4- | sed 's/^/  - /'
            } > .github/M2_COMMON_AI_VERSION
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "AI config content unchanged; skip opening a PR."
          fi

      - name: Create pull request
        if: steps.sync.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          # Omit token -> use the action's default GITHUB_TOKEN, only to "create a
          # PR in this repo" (scope controlled by the permissions above); unrelated
          # to reading the public central repo (the Checkout step above carries no token).
          # caveat: PRs opened by GITHUB_TOKEN do not trigger consumer-side
          #         on: pull_request checks (GitHub anti-recursion); if such a check
          #         is marked required, this PR will be blocked -- switch to a PAT /
          #         GitHub App token when needed (peter-evans FAQ; you can reuse the
          #         App token snippet in docs/adr-001-visibility.md).
          branch: chore/sync-m2-common-ai
          delete-branch: true
          commit-message: 'chore(ai): sync Copilot config from central repo'
          title: 'chore(ai): sync Copilot config from central repo'
          body: |
            Automatically generated by the `sync-m2-common-ai` workflow.

            ## What
            Sync Copilot config files from the central repo `${{ env.CENTRAL_AI_REPO }}`.

            ## Sync scope
            Defined by the central repo's `.github/sync-manifest.txt`; see this PR's
            diff for the files actually changed. (To add paths, edit only the central
            manifest; this downstream workflow needs no changes.)

            ## Why
            Maintain shared conventions and prompt files centrally so repos do not drift.

            ## Verification
            - [ ] diff contains only the paths above
            - [ ] this repo's own conventions are not overwritten (project-specific
                  content should not live in these files)

            See `.github/M2_COMMON_AI_VERSION` for the source version.
          labels: |
            chore
            automated

      # Scheduled failures usually go unnoticed -- open an issue to notify explicitly.
      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'AI config sync failed',
              body: `Scheduled sync failed.\n\n[View run log](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['chore', 'automated']
            });
