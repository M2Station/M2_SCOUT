[common]
string_regex = (?:"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*')
number_regex = \b\d+(?:\.\d+)?\b

; 全域關鍵字（所有檔案都套用）
common_keywords = TODO FIXME NOTE WARNING IMPORTANT HACK BUG XXX TEMP DEPRECATED 

[c]
extensions = .c;.h;.cpp;.cc;.hpp;.hh;.inl
comment_regex = //.*?$|/\*.*?\*/
keywords = auto break case char const continue default do double else enum extern float for goto if inline int long register restrict return short signed sizeof static struct switch typedef union unsigned void volatile while
types_regex = \b(?:uint8_t|uint16_t|uint32_t|uint64_t|int8_t|int16_t|int32_t|int64_t|size_t|ssize_t|bool|wchar_t)\b

[python]
extensions = .py;.pyw
comment_regex = #.*?$
decorator_regex = ^\s*@\w+(?:\.\w+)*
keywords = False None True and as assert async await break class continue def del elif else except finally for from global if import in is lambda nonlocal not or pass raise return try while with yield
