<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>M2_SCOUT</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Tab bar -->
  <div class="tabbar" id="tabbar">
    <div class="tabs" id="tabs"></div>
    <button class="tab-add" id="tabAdd" title="New tab (Ctrl+T)">+</button>
  </div>

  <!-- Tab contents are injected here -->
  <div class="tab-contents" id="tabContents"></div>

  <!-- Per-tab UI template -->
  <template id="tab-template">
    <div class="tab-content">
      <div class="form">
        <div class="grid">
          <label>rg.exe</label>
          <input type="text" data-field="rgExe" class="wide" />
          <button data-action="browseRg" class="btn">Browse rg.exe</button>
          <span class="cpu" data-el="cpu">CPU: --%</span>

          <label>fd.exe</label>
          <input type="text" data-field="fdExe" class="wide" />
          <button data-action="browseFd" class="btn">Browse fd.exe</button>
          <span></span>

          <label>Folder</label>
          <input type="text" data-field="folder" class="wide" />
          <button data-action="selectFolder" class="btn btn-green">Select Folds</button>
          <span></span>

          <label>Filter</label>
          <input type="text" data-field="filter" data-enter="search" />
          <span class="hintcell">e.g. *.c *.h  (blank or *.* = all)</span>
          <span></span>

          <label>Exclude Dirs (manual)</label>
          <input type="text" data-field="excludeDirs" class="wide" />
          <span></span>
          <span></span>

          <label>Exclude Files (manual)</label>
          <input type="text" data-field="excludeFiles" class="wide" />
          <span></span>
          <span></span>

          <label>Exclude Group Keys</label>
          <input type="text" data-field="excludeGroupKeys" class="wide" />
          <span class="btnbar">
            <button data-action="reloadGroups" class="btn">Reload exclude groups</button>
            <button data-action="reloadHl" class="btn">Reload HL</button>
          </span>
          <span></span>

          <label>Keywords</label>
          <input type="text" data-field="keywords" class="wide bold" data-enter="search" />
          <span class="ctrl">
            <span class="ctrl-row">
              <span class="mode">
                <span>Mode</span>
                <label><input type="radio" data-mode="OR" value="OR" /> OR</label>
                <label><input type="radio" data-mode="AND" value="AND" /> AND</label>
              </span>
              <label class="chk"><input type="checkbox" data-field="caseSensitive" /> Case Sensitive</label>
              <button data-action="searchInFiles" class="btn btn-blue">SEARCH_IN_FILES</button>
              <button data-action="searchFilename" class="btn btn-purple">SEARCH_FILENAME</button>
              <button data-action="stop" class="btn btn-red">STOP</button>
            </span>
            <span class="ctrl-row">
              <button data-action="genCscope" class="btn">GEN_cscope.files</button>
              <button data-action="cscope" class="btn">CSCOPE</button>
              <label class="chk"><input type="checkbox" data-field="respectIgnore" /> Respect (.gitignore/.ignore/.rgignore)</label>
            </span>
          </span>
          <span></span>

          <label>Editor CMD</label>
          <input type="text" data-field="editorCmd" class="wide" />
          <span></span>
          <span></span>

          <label>Editor ARGS (template)</label>
          <input type="text" data-field="editorArgs" class="wide" />
          <span></span>
          <span></span>
        </div>
      </div>

      <!-- Files | Preview paned -->
      <div class="paned">
        <div class="pane pane-files">
          <div class="files-header">
            <span class="files-count" data-el="filesCount">Files: 0</span>
            <span class="muted">HL:</span>
            <input type="text" data-el="filesHl" class="small" />
            <span class="muted">Filter:</span>
            <input type="text" data-el="filesFilter" class="small" />
            <button data-action="clearFilesHl" class="btn btn-mini" title="Clear">✕</button>
            <span class="hint">F1:copy  F2:HL  F3:Dim  F4:Clr</span>
          </div>
          <div class="fileslist" data-el="fileslist" tabindex="0"></div>
        </div>
        <div class="splitter" data-el="splitter"></div>
        <div class="pane pane-preview">
          <div class="preview-header">
            <span class="preview-file" data-el="previewFile">Preview</span>
            <span class="hint" data-el="previewHint"></span>
          </div>
          <pre class="preview" data-el="preview" tabindex="0"></pre>
        </div>
      </div>

      <!-- Status bar -->
      <div class="statusbar">
        <span class="status" data-el="status">Ready.</span>
        <span class="status-match" data-el="statusMatch"></span>
      </div>

      <!-- DEBUG -->
      <div class="debug-outer">
        <div class="debug-bar">
          <button data-action="toggleDebug" class="btn btn-mini" data-el="debugToggle">▼ DEBUG</button>
          <button data-action="clearDebug" class="btn btn-mini">Clear</button>
        </div>
        <pre class="debug" data-el="debug"></pre>
      </div>
    </div>
  </template>

  <!-- Context menu for files list -->
  <div class="ctxmenu" id="filesCtxMenu" hidden>
    <div class="ctxitem" data-cmd="openExplorer">Open in Explorer</div>
    <div class="ctxitem" data-cmd="copyPath">Copy path</div>
    <div class="ctxitem" data-cmd="copyRelPath">Copy relative path</div>
  </div>

  <script src="js/highlight.js"></script>
  <script src="js/renderer.js"></script>
</body>
</html>
