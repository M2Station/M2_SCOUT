<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>M2_SCOUT</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/themes.js"></script>
</head>
<body>
  <!-- Tab bar -->
  <div class="tabbar" id="tabbar">
    <div class="tabs" id="tabs"></div>
    <button class="tab-add" id="tabAdd" data-i18n-title="tab.new" title="New tab (Ctrl+T)">+</button>
    <button class="tab-settings" id="btnSettings" data-i18n-title="settings.open" title="Settings">⚙</button>
    <a class="tab-credit" id="appCredit" href="https://github.com/oahsiao" rel="noopener noreferrer" data-i18n-title="credit.title" title="github.com/oahsiao">
      <svg class="gh-icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      <span class="credit-by" data-i18n="credit.by">Powered by</span>
      <span class="credit-name">OA Hsiao</span>
    </a>
  </div>

  <!-- Tab contents are injected here -->
  <div class="tab-contents" id="tabContents"></div>

  <!-- Per-tab UI template -->
  <template id="tab-template">
    <div class="tab-content">
      <div class="form">
        <div class="grid">
          <label data-i18n="form.rgExe">rg.exe</label>
          <input type="text" data-field="rgExe" class="wide" />
          <span class="tool-btns">
            <button data-action="browseRg" class="btn" data-i18n="form.browse">Browse</button>
            <button data-action="checkRgUpdate" class="btn btn-blue" data-i18n="form.checkUpdate">Check update</button>
          </span>
          <span class="cpu" data-el="cpu">CPU: --%</span>

          <label data-i18n="form.fdExe">fd.exe</label>
          <input type="text" data-field="fdExe" class="wide" />
          <span class="tool-btns">
            <button data-action="browseFd" class="btn" data-i18n="form.browse">Browse</button>
            <button data-action="checkFdUpdate" class="btn btn-blue" data-i18n="form.checkUpdate">Check update</button>
          </span>
          <span></span>

          <label data-i18n="form.folder">Folder</label>
          <input type="text" data-field="folder" class="wide" />
          <button data-action="selectFolder" class="btn btn-green" data-i18n="form.selectFolder">Select Folds</button>
          <span></span>

          <label data-i18n="form.filter">Filter</label>
          <input type="text" data-field="filter" data-enter="search" />
          <span class="hintcell" data-i18n="form.filterHint">e.g. *.c *.h  (blank or *.* = all)</span>
          <span></span>

          <label data-i18n="form.excludeGroupKeys">Exclude Group Keys</label>
          <input type="text" data-field="excludeGroupKeys" class="wide" />
          <button data-action="pickExcludeFolders" class="btn" data-i18n="exfolder.button">Exclude Folders…</button>
          <span></span>

          <label data-i18n="form.excludeFiles">Exclude Files (manual)</label>
          <input type="text" data-field="excludeFiles" class="wide" />
          <span></span>
          <span></span>

          <label data-i18n="form.keywords">Keywords</label>
          <span class="kw-wrap">
            <button data-action="keywordHistory" class="btn btn-mini kw-hist" data-i18n-title="history.button" title="Search history">▾</button>
            <input type="text" data-field="keywords" class="wide bold" data-enter="search" />
          </span>
          <span class="ctrl">
            <span class="ctrl-row">
              <span class="mode">
                <span data-i18n="form.mode">Mode</span>
                <label data-i18n-title="form.orTip"><input type="radio" data-mode="OR" value="OR" /> <span data-i18n="form.or">OR</span></label>
                <label data-i18n-title="form.andTip"><input type="radio" data-mode="AND" value="AND" /> <span data-i18n="form.and">AND</span></label>
              </span>
              <label class="chk"><input type="checkbox" data-field="caseSensitive" /> <span data-i18n="form.caseSensitive">Case Sensitive</span></label>
              <button data-action="searchInFiles" class="btn btn-blue" data-i18n="action.searchInFiles">SEARCH_IN_FILES</button>
              <button data-action="searchFilename" class="btn btn-purple" data-i18n="action.searchFilename">SEARCH_FILENAME</button>
              <button data-action="stop" class="btn btn-red" data-i18n="action.stop">STOP</button>
            </span>
            <span class="ctrl-row">
              <button data-action="genCscope" class="btn" data-i18n="action.genCscope" data-i18n-title="action.genCscopeTip">GEN_cscope.files</button>
              <button data-action="cscope" class="btn" data-i18n="action.cscope" data-i18n-title="action.cscopeTip">CSCOPE</button>
              <label class="chk"><input type="checkbox" data-field="respectIgnore" /> <span data-i18n="form.respectIgnore">Respect (.gitignore/.ignore/.rgignore)</span></label>
            </span>
          </span>
          <span></span>

          <label data-i18n="form.editor">Editor</label>
          <input type="hidden" data-field="editorCmd" />
          <span class="editor-readout" data-el="editorReadout"></span>
          <button data-action="pickEditor" class="btn" data-i18n="editor.button">Editor…</button>
          <span></span>

          <label data-i18n="form.editorArgs">Editor ARGS (template)</label>
          <input type="text" data-field="editorArgs" class="wide" />
          <span></span>
          <span></span>
        </div>
      </div>

      <!-- Files | Preview paned -->
      <div class="paned">
        <div class="pane pane-files">
          <div class="files-header">
            <span class="files-count" data-el="filesCount">Files: 0</span>
            <button data-action="toggleFilesView" class="btn btn-mini" data-el="viewToggle" data-i18n-title="files.viewToggle" title="List/Tree">List</button>
            <button data-action="toggleSort" class="btn btn-mini" data-el="sortToggle" data-i18n-title="files.sortToggle" title="Sort: Name/Count">Name</button>
            <button data-action="treeCollapseAll" class="btn btn-mini tree-only" data-i18n-title="files.collapseAll" title="Collapse all">−</button>
            <button data-action="treeExpandAll" class="btn btn-mini tree-only" data-i18n-title="files.expandAll" title="Expand all">+</button>
            <span class="muted" data-i18n="files.hl">HL:</span>
            <input type="text" data-el="filesHl" class="small" />
            <span class="muted" data-i18n="files.filter">Filter:</span>
            <input type="text" data-el="filesFilter" class="small" />
            <button data-action="clearFilesHl" class="btn btn-mini" data-i18n-title="files.clear" title="Clear">✕</button>
            <span class="hint" data-i18n="files.hint">F1:copy  F2:HL  F3:Dim  F4:Clr</span>
          </div>
          <div class="fileslist" data-el="fileslist" tabindex="0"></div>
        </div>
        <div class="splitter" data-el="splitter"></div>
        <div class="pane pane-preview">
          <div class="preview-header">
            <span class="preview-file" data-el="previewFile" data-i18n="preview.title">Preview</span>
            <span class="hint" data-el="previewHint"></span>
          </div>
          <pre class="preview" data-el="preview" tabindex="0"></pre>
        </div>
      </div>

      <!-- Status bar -->
      <div class="statusbar">
        <span class="status" data-el="status" data-i18n="status.ready">Ready.</span>
        <span class="status-match" data-el="statusMatch"></span>
        <span class="status-rate" data-el="statusRate"></span>
        <div class="progress" data-el="progress" hidden><div class="progress-bar"></div></div>
      </div>

      <!-- DEBUG -->
      <div class="debug-outer">
        <div class="debug-bar">
          <button data-action="toggleDebug" class="btn btn-mini" data-el="debugToggle" data-i18n="debug.toggleHidden">▶ DEBUG</button>
          <button data-action="copyDebug" class="btn btn-mini" data-i18n="debug.copy">Copy</button>
          <button data-action="clearDebug" class="btn btn-mini" data-i18n="debug.clear">Clear</button>
        </div>
        <pre class="debug collapsed" data-el="debug"></pre>
      </div>
    </div>
  </template>

  <!-- Context menu for files list -->
  <div class="ctxmenu" id="filesCtxMenu" hidden>
    <div class="ctxitem ctx-compare" data-cmd="compareBeyond" data-i18n="ctx.compareBeyond" hidden>Compare in Beyond Compare</div>
    <div class="ctxitem ctx-multi" data-cmd="openSelected" hidden></div>
    <div class="ctxitem ctx-multi" data-cmd="openSelectedExplorer" data-i18n="ctx.openFilesExplorer" hidden>Open in File Explorer</div>
    <div class="ctxitem ctx-single" data-cmd="openExplorer" data-i18n="ctx.openExplorer">Open in Explorer</div>
    <div class="ctxitem ctx-single" data-cmd="copyPath" data-i18n="ctx.copyPath">Copy path</div>
    <div class="ctxitem ctx-single" data-cmd="copyRelPath" data-i18n="ctx.copyRelPath">Copy relative path</div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/excludePicker.js"></script>
  <script src="js/folderPicker.js"></script>
  <script src="js/editorPicker.js"></script>
  <script src="js/history.js"></script>
  <script src="js/highlight.js"></script>
  <script src="js/renderer.js"></script>
</body>
</html>
